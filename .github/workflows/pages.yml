name: Udgiv website

# GitHub Pages serverer gh-pages-branchen (auto-aktiveret ved branch-oprettelse,
# da GITHUB_TOKEN ikke må oprette Pages-sites). Dette workflow spejler docs/
# til gh-pages, hver gang websitet eller dataene ændres på main.
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Udgiv docs/ til gh-pages
        run: |
          cd docs
          touch .nojekyll
          git init -b gh-pages
          git config user.name "togstatus-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Udgiv website (${GITHUB_SHA})"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

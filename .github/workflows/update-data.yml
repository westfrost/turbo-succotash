name: Opdater togdata

on:
  schedule:
    # Hver time fra tidlig morgen til efter midnat dansk tid.
    # (Cron kører kun på default-branchen, dvs. efter merge til main.)
    - cron: '7 3-23 * * *'
  workflow_dispatch:
    inputs:
      discover:
        description: 'Kør stationsscanning (find nye stationer)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer afhængigheder
        run: npm ci

      - name: Hent togdata
        run: node scripts/fetch.js ${{ inputs.discover == true && '--discover' || '' }}

      - name: Commit og push data
        run: |
          git config user.name "togstatus-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs/data
          if git diff --cached --quiet; then
            echo "Ingen ændringer i data."
            exit 0
          fi
          git commit -m "Data: opdatering $(date -u +'%Y-%m-%d %H:%M') UTC"
          for i in 1 2 3 4; do
            git push && exit 0
            echo "Push fejlede, prøver igen ($i)..."
            git pull --rebase
            sleep $((2 ** i))
          done
          git push

      # Pushes med GITHUB_TOKEN udløser ikke andre workflows (GitHubs
      # rekursions-bremse), så "Udgiv website" reagerer ikke på data-commits.
      # Derfor udgiver vi selv docs/ til gh-pages her.
      - name: Udgiv website til gh-pages
        run: |
          cd docs
          touch .nojekyll
          rm -rf .git
          git init -b gh-pages
          git config user.name "togstatus-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Udgiv website (data $(date -u +'%Y-%m-%d %H:%M') UTC)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

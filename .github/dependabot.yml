# Holder afhængigheder opdateret automatisk via pull requests.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Copenhagen
    labels:
      - vedligehold
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Copenhagen
    labels:
      - vedligehold
